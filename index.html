<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./main.css" />
    <title>Public News</title>
  </head>

  <body>
    <div class="header-wrapper">
      <div class="topbar">
        <div class="topbar-icons">
          <div class="topbar-icon">
            <img src="./assets/icons/icon-facebook.svg" alt="facebook" />
          </div>
          <div class="topbar-icon">
            <img src="./assets/icons/icon-twitter.svg" alt="twitter" />
          </div>
          <div class="topbar-icon">
            <img src="./assets/icons/icon-instagram.svg" alt="instagram" />
          </div>
          <div class="topbar-icon">
            <img src="./assets/icons/icon-youtube.svg" alt="youtube" />
          </div>
        </div>
      </div>

      <header>
        <div class="logo">PUBLIC <span>NEWS</span></div>
        <nav>
          <div class="dropdown">
            <div class="dropdown-toggle">
              <span>Все категории</span>
              <span class="dropdown-arrow"></span>
            </div>
            <div class="dropdown-menu">
              <a href="#" class="dropdown-menu-categorie">Наука</a>
              <a href="#" class="dropdown-menu-categorie">Политика</a>
              <a href="#" class="dropdown-menu-categorie">Экономика</a>
              <a href="#" class="dropdown-menu-categorie">Медицина</a>
              <a href="#" class="dropdown-menu-categorie">Искусство</a>
              <a href="#" class="dropdown-menu-categorie">Путешествия</a>
            </div>
          </div>

          <a href="#" class="about-us__link">О нас</a>

          <button class="btn-login">Войти</button>
        </nav>
      </header>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <form class="footer-subscribe-form" action="">
          <input
            type="email"
            class="footer__input-email"
            placeholder="Введите вашу почту"
          />
          <button type="submit" class="btn-subsribe">ПОДПИСАТЬСЯ</button>
        </form>

        <div class="footer-contacts">
          <a href="tel:+79167779999" class="footer-contact">
            <img
              src="./assets/icons/icon-phone.svg"
              alt="Телефон"
              class="footer-icon"
            />
            <span>+7 916 777 99 99</span>
          </a>

          <a href="mailto:public@news.com" class="footer-contact">
            <img
              src="./assets/icons/icon-mail.svg"
              alt="Почта"
              class="footer-icon"
            />
            <span>public@news.com</span>
          </a>
        </div>
      </div>

      <div class="footer-copyright">© Copyright 2026</div>
    </footer>
  </body>
</html>
